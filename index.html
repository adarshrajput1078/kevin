<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kevin Algorithm | Elite Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg-main: #020202; --accent: #ffffff; --text-dim: #888888; --green: #00ffcc; --red: #ff3366;}
        
        body { 
            background: var(--bg-main); color: var(--accent); 
            font-family: 'Space Grotesk', sans-serif; margin: 0; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; overflow: hidden; user-select: none;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .main-panel, .login-panel { width: 100%; max-width: 380px; padding: 20px; display: flex; flex-direction: column; align-items: center; position: relative; z-index: 10; box-sizing: border-box;}

        /* --- MODERN UPDATED LOGIN BOX --- */
        #login-sec { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(8px); z-index: 100; display: flex; justify-content: center; align-items: center; }
        
        .login-box { 
            background: rgba(15,15,15,0.85); 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            border-radius: 28px; 
            padding: 35px 25px; 
            width: 100%; 
            text-align: center; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
        }

        /* PREMIUM KEY INPUT BOX */
        .l-input { 
            width: 100%; 
            padding: 18px; 
            background: rgba(0, 0, 0, 0.6); 
            border: 2px solid rgba(255, 255, 255, 0.1); 
            color: #fff; 
            font-family: 'Share Tech Mono', monospace; 
            text-align: center; 
            border-radius: 16px; 
            margin: 20px 0; 
            outline: none; 
            font-size: 20px; 
            font-weight: bold;
            letter-spacing: 3px; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
        }
        .l-input:focus { 
            border-color: #fff; 
            box-shadow: 0 0 25px rgba(255,255,255,0.15), inset 0 0 10px rgba(255,255,255,0.05);
            background: #000;
        }
        .l-input::placeholder { color: #444; letter-spacing: 1px; font-size: 16px; font-family: 'Space Grotesk'; }

        /* CIRCULAR BRAND LOGO */
        .logo-container { 
            width: 90px; height: 90px; 
            border-radius: 50%; border: 2px solid #fff; 
            overflow: hidden; display: flex; justify-content: center; align-items: center; 
            margin-bottom: 18px; box-shadow: 0 0 30px rgba(255,255,255,0.2); 
            background: #111; position: relative; 
        }
        .app-logo { width: 100%; height: 100%; object-fit: cover; z-index: 2; }
        .logo-container::after { content: ''; position: absolute; inset: 0; border-radius: 50%; box-shadow: 0 0 20px #fff; opacity: 0; animation: pulseLogo 2s infinite; }
        @keyframes pulseLogo { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(1.4); opacity: 0; } }

        .header h1 { margin: 0; font-size: 26px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; text-shadow: 0 0 15px rgba(255,255,255,0.5); text-align: center;}
        
        .period-box { background: rgba(20,20,20,0.9); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px 20px; margin-top: 15px; width: 100%; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; font-family: 'Share Tech Mono', monospace; box-shadow: inset 0 0 10px rgba(255,255,255,0.02);}
        .period-num { font-size: 14px; color: #fff; letter-spacing: 1px; }
        .timer { font-size: 16px; font-weight: bold; color: #fff; text-shadow: 0 0 10px #fff;}

        /* --- HIGH-TECH SCANNER UI --- */
        .tech-wrapper { position: relative; width: 230px; height: 230px; margin: 30px 0; display: flex; justify-content: center; align-items: center; }
        
        .spinner-ring { position: absolute; inset: 0; border-radius: 50%; border: 2px dashed rgba(255,255,255,0.2); transition: all 0.3s; }
        .radar-sweep { position: absolute; inset: -5px; border-radius: 50%; background: conic-gradient(from 0deg, transparent 70%, rgba(255,255,255,0.9) 100%); animation: spinFast 0.5s linear infinite; display: none; filter: blur(3px); }
        .spinner-ring.fast-spin { border: 2px solid transparent; border-top: 3px solid #fff; border-bottom: 3px solid #fff; animation: spinFast 0.5s linear infinite; box-shadow: 0 0 20px rgba(255,255,255,0.2);}
        @keyframes spinFast { 100% { transform: rotate(360deg); } }

        /* Laser Line */
        .laser-scanner {
            position: absolute; left: 10px; right: 10px; height: 2px;
            background: #fff; box-shadow: 0 0 15px #fff, 0 0 30px #fff;
            top: 0; animation: scanLine 0.8s ease-in-out infinite alternate;
            display: none; z-index: 10; border-radius: 50%;
        }
        @keyframes scanLine { 
            0% { top: 15%; opacity: 0;} 
            20% { opacity: 1;} 
            80% { opacity: 1;} 
            100% { top: 85%; opacity: 0;} 
        }

        .inner-content { position: relative; z-index: 5; display: flex; flex-direction: column; align-items: center; background: #000; border-radius: 50%; width: 190px; height: 190px; justify-content: center; border: 1px solid rgba(255,255,255,0.1); box-shadow: inset 0 0 40px rgba(255,255,255,0.05); overflow: hidden;}
        
        .circle-lbl { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; z-index: 2;}
        .circle-input { width: 80px; background: transparent; border: none; color: #fff; font-size: 55px; font-family: 'Share Tech Mono', monospace; text-align: center; outline: none; margin: 5px 0 15px; font-weight: bold; text-shadow: 0 0 20px rgba(255,255,255,0.5); z-index: 2; }
        .scan-text { font-size: 50px; font-family: 'Share Tech Mono', monospace; font-weight: bold; color: #fff; display: none; margin: 10px 0 15px; text-shadow: 0 0 25px #fff; letter-spacing: 4px; z-index: 2; }

        .btn-execute { background: #fff; color: #000; border: none; border-radius: 24px; padding: 14px 25px; font-weight: 700; cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; width: 100%; box-sizing: border-box; box-shadow: 0 5px 15px rgba(255,255,255,0.2);}
        .btn-execute:active { transform: scale(0.95); }
        .btn-execute:disabled { background: #222; color: #555; box-shadow: none;}

        /* --- RESULT BLAST & GLITCH --- */
        .inline-result { width: 100%; text-align: center; margin-top: 15px; display: none; background: rgba(15,15,15,0.95); border: 1px solid rgba(255,255,255,0.2); border-radius: 16px; padding: 25px 20px; box-sizing: border-box; box-shadow: 0 10px 40px rgba(0,0,0,0.8); position: relative; overflow: hidden;}
        .blast-effect { animation: blastAnim 0.6s cubic-bezier(0.2, 0.9, 0.3, 1.3) forwards; }
        @keyframes blastAnim { 0% { transform: scale(0.8); opacity: 0; filter: brightness(4) blur(10px); } 40% { transform: scale(1.05); filter: brightness(2) blur(0px); } 100% { transform: scale(1); opacity: 1; filter: brightness(1); } }

        .glitch-text { animation: textGlitch 0.4s steps(3, start) forwards; }
        @keyframes textGlitch { 0% { transform: translate(-3px, 3px); opacity: 0.8; } 20% { transform: translate(3px, -3px); opacity: 1; } 40% { transform: translate(-3px, -3px); opacity: 0.9; } 60% { transform: translate(3px, 3px); opacity: 1; } 100% { transform: translate(0, 0); } }

        .res-big { font-size: 52px; font-weight: 700; margin: 0 0 5px; text-transform: uppercase; letter-spacing: 4px; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.4); position: relative;}
        .res-nodes { font-size: 24px; font-family: 'Share Tech Mono', monospace; font-weight: bold; color: #fff; margin-bottom: 20px; letter-spacing: 3px; text-shadow: 0 0 10px rgba(255,255,255,0.3);}

        .feed-row { display: flex; gap: 10px; width: 100%; margin-top: 15px; position: relative; z-index: 2;}
        .feed-btn { flex: 1; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 14px; border-radius: 12px; font-size: 11px; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: 0.2s; backdrop-filter: blur(5px);}
        .feed-btn:active { background: #fff; color: #000; transform: scale(0.96);}

        .system-status { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin-top: 25px; font-family: 'Share Tech Mono'; text-align: center;}
        .warning-banner { display: none; background: rgba(255,51,102,0.1); border: 1px dashed var(--red); color: var(--red); padding: 10px; border-radius: 8px; margin: 15px 0; font-size: 11px; text-align: center; font-weight: bold;}
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #111; border-bottom: 2px solid #fff; color: #fff; padding: 12px 20px; border-radius: 10px; font-size: 12px; font-weight: 600; display: none; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); white-space: nowrap;}

        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="toast" id="toastMsg">MESSAGE</div>

    <div id="login-sec">
        <div class="login-panel">
            <div class="logo-container">
                <img src="Logo.png" alt="Logo" class="app-logo" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI4MCIgaGVpZ2h0PSI4MCI+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsbD0iIzExMSIvPjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBmb250LXNpemU9IjQwIiBmaWxsPSIjZmZmIiBkeT0iLjM1ZW0iIHRleHQtYW5jaG9yPSJtaWRkbGUiPks8L3RleHQ+PC9zdmc+'">
            </div>
            <div class="login-box">
                <h2 style="margin: 0 0 5px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase;">KEVIN AUTH</h2>
                <div style="font-size: 10px; color: var(--text-dim); margin-bottom: 20px; letter-spacing: 1px;">SECURE PROTOCOL</div>
                
                <div style="font-size: 11px; color: #888; margin-bottom: 15px; font-family: 'Share Tech Mono'; border: 1px dashed #333; padding: 10px; border-radius: 8px;">

                <input type="text" id="k-inp" class="l-input" placeholder="ENTER LICENSE KEY" autocomplete="off">

    <div class="main-panel" id="main-sec" style="display: none;">
        
        <div class="logo-container">
            <img src="Logo.png" alt="Logo" class="app-logo" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI4MCIgaGVpZ2h0PSI4MCI+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsbD0iIzExMSIvPjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBmb250LXNpemU9IjQwIiBmaWxsPSIjZmZmIiBkeT0iLjM1ZW0iIHRleHQtYW5jaG9yPSJtaWRkbGUiPks8L3RleHQ+PC9zdmc+'">
        </div>

        <div class="header">
            <h1>KEVIN ALGORITHM</h1>
            
            <div class="warning-banner" id="admin-warn-banner">⚠️ EMERGENCY: MARKET PAUSED</div>

            <div class="period-box">
                <div>
                    <div style="font-size: 9px; color: #888; text-transform: uppercase; margin-bottom: 3px; letter-spacing: 1px;">Pride Period</div>
                    <div class="period-num" id="p-disp">Loading...</div>
                </div>
                <div class="timer" id="t-disp">00:00</div>
            </div>
        </div>

        <div class="tech-wrapper" id="tech-ui">
            <div class="radar-sweep" id="radar-sweep"></div>
            <div class="spinner-ring" id="spin-ring"></div>
            
            <div class="inner-content">
                <div class="laser-scanner" id="laser-line"></div>
                <div class="circle-lbl" id="center-lbl">Base Digit</div>
                <input type="number" class="circle-input" id="s-inp" placeholder="-" autocomplete="off">
                <div class="scan-text" id="scan-disp">00</div>
                <button class="btn-execute" id="p-btn" onclick="executeAlgorithm()" style="width: 80%; padding: 10px;">PREDICT</button>
            </div>
        </div>

        <div class="inline-result" id="res-area">
            <div style="font-size: 11px; color: var(--text-dim); letter-spacing: 3px; margin-bottom: 10px; font-weight:bold;">DECRYPTED MATRIX</div>
            <div class="res-big" id="m-res">BIG</div>
            <div style="font-size: 10px; color: var(--text-dim); margin-bottom: 5px; font-weight:bold; letter-spacing:2px; margin-top: 10px;">TARGET NODES</div>
            <div class="res-nodes" id="m-nums">[ 7 & 9 ]</div>
            
            <div style="font-size: 10px; color: #666; margin-top: 20px; letter-spacing: 1px; border-top: 1px solid #333; padding-top: 15px;">CALIBRATE NEURAL NETWORK:</div>
            <div class="feed-row">
                <button class="feed-btn" onclick="processFeedback('BIG')">CAME BIG</button>
                <button class="feed-btn" onclick="processFeedback('SMALL')">CAME SMALL</button>
            </div>
        </div>

        <div class="system-status" id="sys-stat">SERVER: <span id="s-stat" style="color: var(--green);">ONLINE</span></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, get, child, update, onValue, set, increment, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDazknErTl2PtJAe2JGlRQMJSOR5n2elBc",
            authDomain: "kevin-24998.firebaseapp.com",
            databaseURL: "https://kevin-24998-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "kevin-24998",
            storageBucket: "kevin-24998.firebasestorage.app",
            messagingSenderId: "447846956732",
            appId: "1:447846956732:web:85810883cb614cac1c9ab9"
        };
        const db = getDatabase(initializeApp(firebaseConfig));
        const tg = window.Telegram?.WebApp; if(tg) tg.expand();

        function showToast(msg, isError=false) {
            const t = document.getElementById('toastMsg');
            t.innerText = msg; t.style.borderBottomColor = isError ? 'var(--red)' : '#fff';
            t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2500);
            if(tg) tg.HapticFeedback.notificationOccurred(isError ? 'error' : 'success');
        }

        const tgUser = tg?.initDataUnsafe?.user;
        const tgUsername = tgUser ? (tgUser.username || tgUser.first_name) : "Anonymous";
        const tgIdString = tgUser ? String(tgUser.id) : "DEV_" + Math.floor(Math.random()*1000);
        document.getElementById('tg-user').innerText = tgUsername;
        document.getElementById('tg-node').innerText = tgIdString;
        
        let myId = localStorage.getItem('skm_id');
        if(!myId){ myId = 'TG-' + tgIdString; localStorage.setItem('skm_id', myId); }

        let isAct = false, isWarned = false, gMode = "AUTO", gPer = 0, gStr = ""; 
        let lastPredictedResult = ""; let lossStreak = 0; let scanInterval;

        const inputField = document.getElementById('s-inp');
        inputField.addEventListener('input', function() { if(this.value.length >= 1) { this.value = this.value.slice(0, 1); this.blur(); } });

        onValue(ref(db, 'admin/toolStatus'), (s) => {
            let val = s.val(); let statEl = document.getElementById('s-stat'); let btn = document.getElementById('p-btn');
            if(val === 'OFF') { isAct = false; btn.disabled = true; statEl.innerText = "OFFLINE"; statEl.style.color = "var(--red)"; } 
            else { isAct = true; if(!isWarned && document.getElementById('tech-ui').style.display !== 'none') { btn.disabled = false; } statEl.innerText = "SYNCED"; statEl.style.color = "var(--green)"; }
        });

        onValue(ref(db, 'admin/marketWarning'), (s) => {
            let warn = s.val(); let warnBanner = document.getElementById('admin-warn-banner'); let btn = document.getElementById('p-btn');
            if (warn === 'ON') { isWarned = true; warnBanner.style.display = 'block'; btn.disabled = true; } 
            else { isWarned = false; warnBanner.style.display = 'none'; if(isAct && document.getElementById('tech-ui').style.display !== 'none') { btn.disabled = false; } }
        });

        onValue(ref(db, 'admin/godMode'), (s) => { gMode = s.val() || "AUTO"; });

        document.getElementById('auth-btn').onclick = () => {
            let keyVal = document.getElementById('k-inp').value.trim().toUpperCase();
            if(!keyVal) { showToast("ENTER LICENSE KEY", true); return; }
            document.getElementById('auth-btn').innerText = "VERIFYING...";

            get(child(ref(db), `keys/${keyVal}`)).then((snapshot) => {
                if(snapshot.exists()){
                    let data = snapshot.val();
                    if(data.expiresAt < Date.now()) { showToast("LICENSE EXPIRED", true); } 
                    else if(data.deviceId && data.deviceId !== myId) { showToast("DEVICE BIND MISMATCH", true); } 
                    else {
                        if(!data.deviceId) update(ref(db, `keys/${keyVal}`), { deviceId: myId, tgUser: tgUsername, tgId: tgIdString });
                        let uRef = ref(db, `metrics/activeUsers/${myId}`);
                        set(uRef, { username: tgUsername, tgId: tgIdString, time: Date.now() }); 
                        onDisconnect(uRef).remove();
                        
                        document.getElementById('login-sec').style.display = 'none';
                        document.getElementById('main-sec').style.display = 'flex';
                        showToast("SECURE CONNECTION ESTABLISHED");
                    }
                } else { showToast("INVALID LICENSE", true); }
                document.getElementById('auth-btn').innerText = "VERIFY ACCESS";
            }).catch(() => { showToast("NETWORK TIMEOUT", true); document.getElementById('auth-btn').innerText = "VERIFY ACCESS"; });
        };

        const sum2 = (p) => parseInt(String(p).slice(-2).padStart(2,'0')[0]) + parseInt(String(p).slice(-2).padStart(2,'0')[1]);
        const red1 = (n) => { let c = n; while(c > 9) c = String(c).split('').reduce((a, v) => a + parseInt(v), 0); return c; };

        window.executeAlgorithm = function() {
            if(!isAct || isWarned) return;
            let inpVal = inputField.value.trim();
            if(inpVal === "") { if(tg) tg.HapticFeedback.notificationOccurred('error'); return showToast("ENTER BASE DIGIT", true); }
            
            inputField.blur(); 
            const btn = document.getElementById('p-btn'); const ring = document.getElementById('spin-ring');
            const radar = document.getElementById('radar-sweep'); const scanDisp = document.getElementById('scan-disp');
            const centerLbl = document.getElementById('center-lbl');
            const laserLine = document.getElementById('laser-line'); 
            
            btn.disabled = true; btn.innerText = "SCANNING...";
            ring.classList.add('fast-spin'); radar.style.display = 'block'; 
            laserLine.style.display = 'block'; 
            inputField.style.display = 'none'; scanDisp.style.display = 'block';
            centerLbl.innerText = "DECRYPTING";
            
            if(tg) tg.HapticFeedback.impactOccurred('medium');

            scanInterval = setInterval(() => { scanDisp.innerText = Math.floor(Math.random() * 90 + 10); }, 50);

            setTimeout(() => {
                clearInterval(scanInterval); 
                
                let finalRes; let finalNum;
                if(gMode === "BIG" || gMode === "SMALL") { finalRes = gMode; } 
                else {
                    let baseSum = (sum2(gPer) + sum2(gPer-1) + sum2(gPer-3)) * 3;
                    finalNum = red1(Math.abs(baseSum - parseInt(inpVal)));
                    if(gPer % 2 === 0) finalNum = (finalNum + 3) % 10;
                    let isBig = finalNum >= 5;
                    if(lossStreak >= 2) { isBig = !isBig; }
                    finalRes = isBig ? "BIG" : "SMALL";
                }
                lastPredictedResult = finalRes;

                let pool = finalRes === "BIG" ? [5,6,7,8,9] : [0,1,2,3,4];
                let num1 = (typeof finalNum !== 'undefined') ? finalNum : pool[Math.floor(Math.random() * pool.length)];
                if ((finalRes==="BIG" && num1 < 5) || (finalRes==="SMALL" && num1 >= 5)) { num1 = pool[Math.floor(Math.random() * pool.length)]; }
                let num2; do { num2 = pool[Math.floor(Math.random() * pool.length)]; } while(num1 === num2);
                let finalArr = [num1, num2].sort((a,b)=>a-b);

                const mRes = document.getElementById('m-res');
                mRes.innerText = finalRes;
                document.getElementById('m-nums').innerText = `[ ${finalArr[0]} & ${finalArr[1]} ]`;
                
                document.getElementById('tech-ui').style.display = 'none';
                const resArea = document.getElementById('res-area');
                resArea.style.display = 'block';
                resArea.classList.remove('blast-effect');
                void resArea.offsetWidth; 
                resArea.classList.add('blast-effect');

                mRes.classList.remove('glitch-text');
                void mRes.offsetWidth;
                mRes.classList.add('glitch-text');

                if(tg) tg.HapticFeedback.impactOccurred('heavy');
            }, 3000); 
        };

        window.processFeedback = function(actualResult) {
            if(actualResult === lastPredictedResult) { lossStreak = 0; } else { lossStreak++; }
            if (lossStreak >= 3) { try { update(ref(db, 'metrics'), { badMarketReports: increment(1) }); } catch(e){} }

            document.getElementById('res-area').style.display = 'none';
            document.getElementById('tech-ui').style.display = 'flex';
            
            document.getElementById('spin-ring').classList.remove('fast-spin');
            document.getElementById('radar-sweep').style.display = 'none';
            document.getElementById('laser-line').style.display = 'none'; 
            document.getElementById('scan-disp').style.display = 'none';
            document.getElementById('center-lbl').innerText = "BASE DIGIT";
            
            inputField.style.display = 'block'; inputField.value = '';
            const btn = document.getElementById('p-btn');
            
            if(isAct && !isWarned) { btn.disabled = false; btn.innerText = "PREDICT"; }
            else if (isWarned) { btn.disabled = true; btn.innerText = "PAUSED"; }
            
            if(tg) tg.HapticFeedback.notificationOccurred('success');
        }

        setInterval(() => {
            let n = new Date(); let t = new Date(n.getTime() + 1000); let r = 59 - n.getUTCSeconds();
            gPer = 10001 + (t.getUTCHours() * 60) + t.getUTCMinutes();
            gStr = `${t.getUTCFullYear()}${String(t.getUTCMonth()+1).padStart(2,'0')}${String(t.getUTCDate()).padStart(2,'0')}-${gPer}`;
            document.getElementById('p-disp').innerText = gStr;
            document.getElementById('t-disp').innerText = `00:${String(r).padStart(2,'0')}`;
        }, 1000);
    </script>
</body>
</html>
