<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sikkim AI | Admin Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Share+Tech+Mono&display=swap');
        
        body { background-color: #050505; color: #fff; font-family: 'Poppins', sans-serif; padding: 20px; display: flex; justify-content: center; }
        .admin-container { width: 100%; max-width: 500px; }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 20px; }
        .header h1 { margin: 0; color: #f59e0b; font-size: 24px; text-transform: uppercase; letter-spacing: 2px;}
        
        .control-card { background: #111; border: 1px solid #333; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .control-title { font-size: 14px; color: #888; margin-bottom: 15px; text-transform: uppercase; font-weight: 800; letter-spacing: 1px;}
        
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #ccc;}
        input[type="text"], select { width: 100%; background: #000; color: #fff; border: 1px solid #444; padding: 12px; border-radius: 8px; font-size: 16px; margin-bottom: 20px; outline: none; font-family: 'Poppins'; }
        input[type="text"]:focus, select:focus { border-color: #f59e0b; }
        
        /* Toggle Switch */
        .switch { position: relative; display: inline-block; width: 60px; height: 34px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ef4444; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #10b981; }
        input:checked + .slider:before { transform: translateX(26px); }

        .btn-update { background: #f59e0b; color: #000; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.3s;}
        .btn-update:hover { background: #d97706; }
        .btn-danger { background: #ef4444; color: white;}
        .btn-danger:hover { background: #dc2626;}

        #live-log { background: #000; border: 1px solid #333; padding: 15px; border-radius: 8px; font-family: 'Share Tech Mono'; font-size: 12px; color: #10b981; height: 150px; overflow-y: auto; }
    </style>
</head>
<body>

    <div class="admin-container">
        <div class="header">
            <h1>Sikkim Master Panel</h1>
            <p style="color: #666; font-size: 12px;">Authorized Access Only: Kevin Sureshot</p>
        </div>

        <div class="control-card" style="border-color: #ef4444;">
            <div class="control-title" style="color: #ef4444;">Security Management (Access Key)</div>
            <label>Current Key Last Updated:</label>
            <div id="key-timestamp-display" style="color: #10b981; font-family: 'Share Tech Mono'; margin-bottom: 15px; font-size: 13px;">Checking connection...</div>
            
            <label>Set New Access Key:</label>
            <input type="text" id="newAccessKey" placeholder="e.g. SIKKIM123">
            <button class="btn-update btn-danger" id="updateKeyBtn">CHANGE PASSWORD NOW</button>
        </div>

        <div class="control-card">
            <div class="control-title">System Power</div>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-weight: 600; font-size: 16px;">App Server Status</span>
                <label class="switch">
                    <input type="checkbox" id="serverToggle" checked>
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="control-card">
            <div class="control-title">Result Override Engine</div>
            <label>Force Next Prediction:</label>
            <select id="resultHack">
                <option value="AUTO">AUTO (Mathematical Logic)</option>
                <option value="BIG">FORCE BIG (Wins guaranteed Big)</option>
                <option value="SMALL">FORCE SMALL (Wins guaranteed Small)</option>
            </select>
            
            <button class="btn-update" id="saveSettingsBtn">UPDATE LIVE SERVER</button>
        </div>

        <div class="control-card">
            <div class="control-title">Live Diagnostics Console</div>
            <div id="live-log">> Admin panel booting...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const logBox = document.getElementById('live-log');
        function addLog(msg, isError = false) {
            const color = isError ? '#ef4444' : '#10b981';
            logBox.innerHTML += `<br><span style="color:${color}">> ${msg}</span>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        addLog("Attempting to connect to Firebase...");

        const firebaseConfig = {
            apiKey: "AIzaSyAJk3E5Itcz7DU-op_bqwgqSobmD8rfNq8",
            authDomain: "sikkimaitool.firebaseapp.com",
            databaseURL: "https://sikkimaitool-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "sikkimaitool",
            storageBucket: "sikkimaitool.firebasestorage.app",
            messagingSenderId: "897487739765",
            appId: "1:897487739765:web:34f9df57ee8372aa6b913c"
        };

        let db;
        try {
            const app = initializeApp(firebaseConfig);
            db = getDatabase(app);
            addLog("Firebase App Initialized successfully!");
        } catch(e) {
            addLog(`Init Error: ${e.message}`, true);
        }
        
        const settingsRef = ref(db, 'admin_settings');

        onValue(settingsRef, (snapshot) => {
            try {
                const data = snapshot.val();
                if(data) {
                    if(data.serverOnline !== undefined) document.getElementById('serverToggle').checked = data.serverOnline;
                    if(data.forceResult) document.getElementById('resultHack').value = data.forceResult;
                    if(data.accessKey) document.getElementById('newAccessKey').value = data.accessKey;
                    document.getElementById('key-timestamp-display').innerText = data.keyUpdatedAt || "Never";
                    addLog("Live data synced from database.");
                } else {
                    addLog("Database is empty. Ready to push new settings.");
                }
            } catch(e) {
                addLog(`Read Error: ${e.message}`, true);
            }
        });

        document.getElementById('saveSettingsBtn').addEventListener('click', () => {
            const isOnline = document.getElementById('serverToggle').checked;
            const hackMode = document.getElementById('resultHack').value;
            const btn = document.getElementById('saveSettingsBtn');
            
            btn.innerText = "SENDING DATA...";

            update(settingsRef, {
                serverOnline: isOnline,
                forceResult: hackMode
            }).then(() => {
                addLog(`SUCCESS: Pushed [Mode: ${hackMode}, Status: ${isOnline}]`);
                btn.innerText = "SAVED SUCCESSFULLY!"; 
                btn.style.background = "#10b981";
                setTimeout(() => { btn.innerText = "UPDATE LIVE SERVER"; btn.style.background = "#f59e0b"; }, 2000);
            }).catch((error) => { 
                addLog(`WRITE ERROR: ${error.message}`, true); 
            });
        });

        document.getElementById('updateKeyBtn').addEventListener('click', () => {
            const newKey = document.getElementById('newAccessKey').value;
            if(!newKey || newKey.trim() === "") { alert("Password cannot be empty!"); return; }

            const timestamp = new Date().toLocaleString('en-IN');

            update(settingsRef, {
                accessKey: newKey,
                keyUpdatedAt: timestamp
            }).then(() => {
                addLog(`SECURITY: Password changed to '${newKey}' at ${timestamp}`);
                const btn = document.getElementById('updateKeyBtn');
                btn.innerText = "PASSWORD CHANGED!"; btn.style.background = "#10b981";
                setTimeout(() => { btn.innerText = "CHANGE PASSWORD NOW"; btn.style.background = "#ef4444"; }, 2000);
            }).catch((error) => { addLog(`WRITE ERROR: ${error.message}`, true); });
        });
    </script>
</body>
</html>
